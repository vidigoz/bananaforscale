# Netlify configuration
# No build step needed — es un sitio estático puro

[build]
  publish = "."

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=()"

# Redirigir todo a index.html (SPA-style, por si agregas rutas)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
